<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://placehold.co/50x50/953BF8/white?text=K" rel="icon">
    <link href="https://placehold.co/50x50/953BF8/white?text=K" rel="apple-touch-icon">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff;
            /* No background */
        }

        .review-container {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>

    <div class="review-container">
        <h3 class="text-center mb-4">Submit Your Review for Kairos</h3>
        <form method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
            {% csrf_token %}

            <div class="form-row">
                <div class="col-md-12 mb-3">
                    <label for="name">Your Name</label>
                    <input type="text" name="name" id="name" class="form-control is-invalid" placeholder="John Doe"
                        required>
                    <div class="valid-feedback">Looks good!</div>
                    <div class="invalid-feedback">Please enter your name.</div>

                </div>
                <div class="col-md-12 mb-3">
                    <label for="who_you_are">Who You Are</label>
                    <input type="text" name="who_you_are" id="who_you_are" class="form-control is-invalid"
                        placeholder="e.g. Music Producer" required>
                    <div class="valid-feedback">Looks good!</div>
                    <div class="invalid-feedback">Please enter what you do.</div>


                </div>
                <div class="col-md-12 mb-3">
                    <label for="rating">Rating</label>
                    <select name="rating" id="rating" class="form-select is-invalid" required>
                        <option value="" selected disabled>Select a rating</option>
                        <option value="1">1 - Poor</option>
                        <option value="2">2 - Fair</option>
                        <option value="3">3 - Good</option>
                        <option value="4">4 - Very Good</option>
                        <option value="5">5 - Excellent</option>
                    </select>
                    <div class="invalid-feedback">Please select a rating.</div>
                </div>
            </div>

            <div class="form-row">
                <div class="col-md-12 mb-3">
                    <label for="testimony">Your Testimony</label>
                    <textarea name="testimony" id="testimony" class="form-control is-invalid" rows="4"
                        placeholder="Write your review here..." required></textarea>
                    <div class="invalid-feedback">Testimony cannot be empty.</div>
                </div>
            </div>

            <div class="form-row">
                <div class="col-md-12 mb-3">
                    <label for="user_image">Upload Your Image</label>
                    <input type="file" name="user_image" id="user_image" class="form-control is-invalid">
                    <div class="invalid-feedback">Please upload an image.</div>
                </div>
            </div>

            <button class="btn btn-primary w-100" type="submit">Submit Review</button>
        </form>
    </div>

    <script>
        // Bootstrap validation script
        (function () {
            'use strict';
            var forms = document.querySelectorAll('.needs-validation');
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>

</body>

</html>
