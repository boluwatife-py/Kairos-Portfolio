<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://placehold.co/50x50/953BF8/white?text=K" rel="icon">
    <link href="https://placehold.co/50x50/953BF8/white?text=K" rel="apple-touch-icon">
    <style>
        body {
            background-color: #0d11174b;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .review-container {
            padding: 30px;
            border-radius: 10px;
            width: 100%;
        }

        .form-control {
            border: 1px solid #30363d;
            color: white;
        }

        .form-control:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 5px rgba(88, 166, 255, 0.5);
        }

        .btn-primary {
            background-color: #58a6ff;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1f6feb;
        }
    </style>
</head>

<body>

    <div class="review-container">
        <h2 class="text-center">Submit Your Review</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="mb-3">
                <label for="who_you_are" class="form-label">Who You Are</label>
                <input type="text" name="who_you_are" id="who_you_are" class="form-control"
                    placeholder="e.g. Music Producer" required>
            </div>

            <div class="mb-3">
                <label for="rating" class="form-label">Rating (1-5)</label>
                <input type="number" name="rating" id="rating" class="form-control" min="1" max="5" placeholder="5"
                    required>
            </div>

            <div class="mb-3">
                <label for="testimony" class="form-label">Your Testimony</label>
                <textarea name="testimony" id="testimony" class="form-control" rows="4"
                    placeholder="Write your review here..." required></textarea>
            </div>

            <div class="mb-3">
                <label for="user_image" class="form-label">Upload Image</label>
                <input type="file" name="user_image" id="user_image" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit Review</button>
        </form>
    </div>

</body>

</html>
